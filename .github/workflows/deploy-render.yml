name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Render
        uses: render-deploy-action@v1
        with:
          render-service-url: https://campusai-backend.onrender.com
          deploy-token: ${{ secrets.RENDER_DEPLOY_TOKEN }}
